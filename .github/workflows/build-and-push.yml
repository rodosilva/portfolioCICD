name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment variables
        run: |
          # Filter out empty lines and comments, then export variables to GITHUB_ENV
          grep -v '^\s*$' .env.local | grep -v '^\s*#' | while IFS= read -r line; do
          echo "$line" >> "$GITHUB_ENV"

      - name: Echo environment variables
        run: |
          echo "Container Name: $DOCKER_CONTAINER_NAME"
          echo "Image Name: $DOCKER_IMAGE_NAME"
          echo "Tag: $DOCKER_TAG"
          echo "Registry: $DOCKER_REGISTRY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: $DOCKER_REGISTRY/$DOCKER_IMAGE_NAME
          tags: |
            type=semver,pattern={{version}},value=$DOCKER_TAG

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max