name: Deploy Docker Image to GitHub Pages

on:
  workflow_run:
    workflows: ["Build and Push to Docker Hub"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment variables
        run: |
          # Filter out empty lines and comments, then export variables to GITHUB_ENV
          grep -v '^\s*$' .env.local | grep -v '^\s*#' | while IFS= read -r line; do
          echo "$line" >> "$GITHUB_ENV"
          done

      - name: Echo environment variables
        run: |
          echo "Container Name: $DOCKER_CONTAINER_NAME"
          echo "Image Name: $DOCKER_IMAGE_NAME"
          echo "Tag: $DOCKER_TAG"
          echo "Registry: $DOCKER_REGISTRY"

      - name: Extract Docker image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          docker create --name temp-container ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          docker cp temp-container:/usr/share/nginx/html/portfolio ./dist
          docker rm temp-container

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: deploy-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
